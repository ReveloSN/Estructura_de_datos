<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vaccine Temperature Monitor</title>
</head>
<body>

    <h2>Vaccine Temperature Monitoring System</h2>

    <label>Enter temperature (°C):</label>
    <input type="number" id="temperatureInput" step="0.1">

    <button onclick="addTemperature()">Add Temperature</button>
    <button onclick="processTemperature()">Process Next</button>

    <h3>Queue:</h3>
    <div id="queueStatus">Empty</div>

    <h3>Log:</h3>
    <div id="log"></div>

    <script src="app.js"></script>

</body>
</html>
